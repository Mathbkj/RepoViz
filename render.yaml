services:
  - type: web
    name: repo-viz-api
    env: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: node backend/dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

  - type: static_site
    name: repoviz
    plan: free
    branch: main
    buildCommand: cd .. && npm install && cd frontend && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://repo-viz-api.onrender.com
