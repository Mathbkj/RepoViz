services:
  - type: web
    name: repo-viz-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm run build --workspace=shared && npm run build --workspace=backend
    startCommand: node backend/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_CLIENT_ID
        sync: false          # preencher no painel do Render
      - key: GITHUB_CLIENT_SECRET
        sync: false          # preencher no painel do Render
      - key: ALLOWED_ORIGIN
        sync: false          # URL do Netlify após o deploy do frontend
      - key: FRONTEND_URL
        sync: false          # mesma URL do Netlify
